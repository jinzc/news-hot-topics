name: 更新热榜数据

on:
  schedule:
    # 7-23点每半小时更新一次（UTC = 北京时间-8）
    - cron: '0,30 23 * * *'   # 北京时间 7:00, 7:30
    - cron: '0,30 0 * * *'    # 北京时间 8:00, 8:30
    - cron: '0,30 1 * * *'    # 北京时间 9:00, 9:30
    - cron: '0,30 2 * * *'    # 北京时间 10:00, 10:30
    - cron: '0,30 3 * * *'    # 北京时间 11:00, 11:30
    - cron: '0,30 4 * * *'    # 北京时间 12:00, 12:30
    - cron: '0,30 5 * * *'    # 北京时间 13:00, 13:30
    - cron: '0,30 6 * * *'    # 北京时间 14:00, 14:30
    - cron: '0,30 7 * * *'    # 北京时间 15:00, 15:30
    - cron: '0,30 8 * * *'    # 北京时间 16:00, 16:30
    - cron: '0,30 9 * * *'    # 北京时间 17:00, 17:30
    - cron: '0,30 10 * * *'   # 北京时间 18:00, 18:30
    - cron: '0,30 11 * * *'   # 北京时间 19:00, 19:30
    - cron: '0,30 12 * * *'   # 北京时间 20:00, 20:30
    - cron: '0,30 13 * * *'   # 北京时间 21:00, 21:30
    - cron: '0,30 14 * * *'   # 北京时间 22:00, 22:30
    - cron: '0,30 15 * * *'   # 北京时间 23:00, 23:30
    # 次日6点更新（整合23-6点的数据）
    - cron: '0 22 * * *'      # 北京时间 6:00（次日）
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 运行爬虫
        run: |
          python3 scripts/fetch_hot_topics.py
          
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_topics.json
          git diff --cached --quiet || git commit -m "update: $(date +'%Y-%m-%d %H:%M') 热榜数据"
          git push
