name: 更新热榜数据

on:
  schedule:
    # 7-23点每小时整点更新（UTC = 北京时间-8）
    - cron: '0 23 * * *'   # 北京时间 7:00
    - cron: '0 0 * * *'    # 北京时间 8:00
    - cron: '0 1 * * *'    # 北京时间 9:00
    - cron: '0 2 * * *'    # 北京时间 10:00
    - cron: '0 3 * * *'    # 北京时间 11:00
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '0 5 * * *'    # 北京时间 13:00
    - cron: '0 6 * * *'    # 北京时间 14:00
    - cron: '0 7 * * *'    # 北京时间 15:00
    - cron: '0 8 * * *'    # 北京时间 16:00
    - cron: '0 9 * * *'    # 北京时间 17:00
    - cron: '0 10 * * *'   # 北京时间 18:00
    - cron: '0 11 * * *'   # 北京时间 19:00
    - cron: '0 12 * * *'   # 北京时间 20:00
    - cron: '0 13 * * *'   # 北京时间 21:00
    - cron: '0 14 * * *'   # 北京时间 22:00
    - cron: '0 15 * * *'   # 北京时间 23:00
    # 次日6点更新（整合23-6点的数据）
    - cron: '0 22 * * *'   # 北京时间 6:00（次日）
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 运行爬虫
        run: |
          python3 scripts/fetch_hot_topics.py
          
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_topics.json
          git diff --cached --quiet || git commit -m "update: $(date +'%Y-%m-%d %H:%M') 热榜数据"
          git push
